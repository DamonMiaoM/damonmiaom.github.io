{{ define "main" }}
<section class="hero">
  <h1>{{ .Site.Params.tagline }}</h1>
</section>

<section class="post-grid">
  <h2 class="section-label">Recent Posts</h2>
  <div class="grid">
    {{ range first 6 (where .Site.RegularPages "Section" "blog") }}
    <article class="post-card">
      <a href="{{ .RelPermalink }}">
        <h3>{{ .Title }}</h3>
        <time>{{ .Date.Format "January 2, 2006" }}</time>
        <p>{{ .Summary }}</p>
      </a>
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
