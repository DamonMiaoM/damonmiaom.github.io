{{ define "main" }}
<div id="reading-progress"></div>
<article class="journal-single">
  <a class="journal-back" href="/journal/">← Journal</a>
  <header class="post-header">
    <h1>{{ if .Title }}{{ .Title }}{{ else }}{{ .Date.Format "January 2, 2006" }}{{ end }}</h1>
    <time>{{ .Date.Format "January 2, 2006" }}</time><span class="reading-time" id="journal-wc"></span>
  </header>
  <div class="post-content journal-body">
    {{ .Content }}
  </div>
</article>
<script>
(function () {
  var body = document.querySelector('.journal-body');
  var el   = document.getElementById('journal-wc');
  if (!body || !el) return;
  var text    = body.innerText || body.textContent || '';
  var chinese = (text.match(/[\u4e00-\u9fff\u3400-\u4dbf\uf900-\ufaff]/g) || []).length;
  if (chinese > 20) {
    el.textContent = ' · ' + chinese + ' 字';
  } else {
    var words = text.trim().split(/\s+/).filter(function (w) { return w.length > 0; }).length;
    el.textContent = ' · ' + words + ' words';
  }
})();
</script>
<script>
(function () {
  var bar = document.getElementById('reading-progress');
  var content = document.querySelector('.journal-body');
  if (!bar || !content) return;
  function update() {
    var top = content.getBoundingClientRect().top + window.scrollY;
    var pct = Math.min(Math.max((window.scrollY - top) / content.offsetHeight, 0), 1);
    bar.style.width = (pct * 100) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
})();
</script>
{{ end }}
