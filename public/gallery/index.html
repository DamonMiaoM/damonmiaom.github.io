<div id="lightbox" class="lightbox" onclick="this.classList.remove('active')">
  <img id="lightbox-img" src="" alt="" />
</div>
<script>
document.querySelectorAll('.gallery-item img').forEach(function(img) {
  img.style.cursor = 'zoom-in';
  img.addEventListener('click', function() {
    document.getElementById('lightbox-img').src = this.src;
    document.getElementById('lightbox-img').alt = this.alt;
    document.getElementById('lightbox').classList.add('active');
  });
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('active');
});
</script>

<script>
(function () {
  var bar = document.getElementById('reading-progress');
  var content = document.querySelector('.post-content');
  if (!bar || !content) return;
  function update() {
    var top = content.getBoundingClientRect().top + window.scrollY;
    var pct = Math.min(Math.max((window.scrollY - top) / content.offsetHeight, 0), 1);
    bar.style.width = (pct * 100) + '%';
  }
  window.addEventListener('scroll', update, { passive: true });
  update();
})();
</script>

<script>
(function () {
  var tocLinks = document.querySelectorAll('.toc-sidebar a');
  if (!tocLinks.length) return;
  var headings = document.querySelectorAll('.post-content h2, .post-content h3');
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (e.isIntersecting) {
        tocLinks.forEach(function (l) { l.classList.remove('toc-active'); });
        var a = document.querySelector('.toc-sidebar a[href="#' + e.target.id + '"]');
        if (a) a.classList.add('toc-active');
      }
    });
  }, { rootMargin: '-10% 0px -75% 0px' });
  headings.forEach(function (h) { observer.observe(h); });
})();
</script>
