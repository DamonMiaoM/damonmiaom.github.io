backend:
  name: github
  repo: DamonMiaoM/damonmiaom.github.io
  branch: main
  base_url: https://lively-kheer-447e2e.netlify.app

media_folder: static/images/uploads
public_folder: /images/uploads

collections:
  - name: blog
    label: Blog Posts
    folder: content/blog
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss" }
      - { label: "Body", name: "body", widget: "markdown" }
